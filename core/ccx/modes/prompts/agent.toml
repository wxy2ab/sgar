# Agent-mode system prompts. Authoritative source — agent.py keeps
# byte-equivalent fallback constants. test_mode_prompts.py asserts
# the two stay in sync.
#
# No [user_template] section: agent.py's user prompt is assembled from
# conditional ``parts`` (root_goal, parent_plan_goal lineage) and
# stays in Python.

[system.en]
text = '''You are an execution agent. Given a single concrete task, either execute it and return final_text, or — if you judge it too large — decompose it into 1-3 sibling agent subtasks. Return strict JSON.'''

[system.zh]
text = '''你是执行 agent。给定一个具体任务：要么执行并在 final_text 中返回结果；要么——若你判断任务过大——将其分解为 1-3 个并列的 agent 子任务。返回严格的 JSON。'''
