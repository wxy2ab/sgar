# Static type-check configuration for ``core/ccx``.
#
# ``core/ccx`` had no mypy / static-type configuration of its own: the only
# ``[tool.mypy]`` in the repo lives under ``core/deepstack-agent/factorgen_v1``
# and does NOT cover this package. This file is purely additive — it introduces
# a *scoped, deliberately lenient* baseline so type errors become a tracked
# signal, without forcing a large annotation effort on an existing ~54k-line
# tree. Annotations are incremental: do NOT rewrite runtime logic to satisfy
# mypy.
#
# Run from the repository root:
#
#     mypy --config-file core/ccx/mypy.ini
#
# Both ``core`` and ``core/ccx`` ship an ``__init__.py``, so mypy names modules
# ``core.ccx.*`` and resolves the relative imports used throughout the tree.
#
# Philosophy mirrors factorgen_v1's Tier-4 lane: start non-strict, tighten later.

[mypy]
python_version = 3.13
files = core/ccx
# Resolve the ``core.ccx`` package from the repo root regardless of cwd.
mypy_path = .
# Large pre-existing codebase + third-party deps that may lack stubs in the dev
# env — keep the baseline quiet and actionable rather than drowning in noise.
ignore_missing_imports = True
follow_imports = silent
# Untyped function bodies are not an error yet (annotations are incremental).
check_untyped_defs = False
warn_unused_ignores = False
warn_redundant_casts = False
